; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:az-delivery-devkit-v4]
platform = espressif32@6.9.0
platform_packages =
	framework-arduinoespressif32 @ https://github.com/espressif/arduino-esp32.git#2.0.15
board = az-delivery-devkit-v4
framework = arduino
monitor_speed = 115200
board_build.partitions = huge_app.csv
debug_tool = esp-prog
build_flags = 
	-Os
	-DCORE_DEBUG_LEVEL=0
	-DARDUINO_USB_CDC_ON_BOOT=0
lib_deps = 
	paulstoffregen/OneWire@^2.3.7
 	https://github.com/adafruit/Adafruit_NeoPixel.git
	teemuatlut/TMCStepper@^0.7.3
	https://github.com/youseetoo/FastAccelStepper.git
	https://github.com/madhephaestus/ESP32Encoder.git
	bblanchon/ArduinoJson@^7.4.2
	links2004/WebSockets@^2.4.1	

# az-delivery-devkit-v4 with TCA9535/TCA9555 shift-register for ENABLE/DIR pins
[env:az-delivery-devkit-v4-tca]
platform = espressif32@6.9.0
platform_packages =
	framework-arduinoespressif32 @ https://github.com/espressif/arduino-esp32.git#2.0.15
board = az-delivery-devkit-v4
framework = arduino
monitor_speed = 115200
board_build.partitions = huge_app.csv
debug_tool = esp-prog
build_flags =
	-Os
	-DCORE_DEBUG_LEVEL=0
	-DARDUINO_USB_CDC_ON_BOOT=0
	-DUSE_TCA_PINS          ; route ENABLE + DIR through TCA9535 via I2C
lib_deps =
	paulstoffregen/OneWire@^2.3.7
	https://github.com/adafruit/Adafruit_NeoPixel.git
	teemuatlut/TMCStepper@^0.7.3
	https://github.com/youseetoo/FastAccelStepper.git
	https://github.com/madhephaestus/ESP32Encoder.git
	bblanchon/ArduinoJson@^7.4.2
	links2004/WebSockets@^2.4.1
	robtillaart/TCA9555@^0.3.0


# ESP32s3 XIAO
[env:seeed_xiao_esp32s3]
platform = espressif32@6.9.0
platform_packages =
	framework-arduinoespressif32 @ https://github.com/espressif/arduino-esp32.git#2.0.15
framework =
	arduino
monitor_filters = esp32_exception_decoder
board = seeed_xiao_esp32s3
board_build.flash_mode = qio
board_build.partitions = custom_partition_esp32s3.csv
board_upload.flash_size = 8MB
build_unflags = -std=gnu++11
build_flags = 	-DARDUINO_USB_MODE=1
  				-DARDUINO_USB_CDC_ON_BOOT=1
lib_deps =
	paulstoffregen/OneWire@^2.3.7
 	https://github.com/adafruit/Adafruit_NeoPixel.git
	teemuatlut/TMCStepper@^0.7.3
	https://github.com/youseetoo/FastAccelStepper.git
	https://github.com/madhephaestus/ESP32Encoder.git
	bblanchon/ArduinoJson@^7.4.2
	links2004/WebSockets@^2.4.1

# Sparkle IOT XH-S3E (N16R8 — 16 MB flash, 8 MB PSRAM) — pH + BME280 monitor
[env:xh-s3e-ph-monitor]
platform = espressif32@6.9.0
platform_packages =
	framework-arduinoespressif32 @ https://github.com/espressif/arduino-esp32.git#2.0.15
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
monitor_port = COM5
upload_port = COM5
board_build.flash_mode = qio
board_build.flash_size = 16MB
board_upload.flash_size = 16MB
board_build.partitions = custom_partition_esp32s3.csv
build_unflags = -std=gnu++11
build_type = debug
build_flags =
	-DARDUINO_USB_MODE=1
	-DARDUINO_USB_CDC_ON_BOOT=0
	-DCONFIG_IDF_TARGET_ESP32S3=1
lib_deps =
	paulstoffregen/OneWire@^2.3.7
	milesburton/DallasTemperature@^3.9.0
	bblanchon/ArduinoJson@^7.4.2
	links2004/WebSockets@^2.4.1
	adafruit/Adafruit BME280 Library@^2.2.4
	adafruit/Adafruit Unified Sensor@^1.1.14
